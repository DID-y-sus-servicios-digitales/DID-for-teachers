<link rel="icon" type="image/png" sizes="16x16"  href="favicon-16x16.png">
<meta name="msapplication-TileColor" content="#ffffff">

<title>DID for teachers</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    <div>
        <input id="usuario" type="text" placeholder="Nombre de usuario">
        <button id="login">Iniciar sesión</button>
        <p>Creado por Daniel Tejedor</p>
    </div>
</div>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBNxuXBtO9LG81LAfnlMjyYgdVdP-4pz9c",
    authDomain: "didteachers.firebaseapp.com",
    projectId: "didteachers",
    storageBucket: "didteachers.firebasestorage.app",
    messagingSenderId: "197082231963",
    appId: "1:197082231963:web:489a176bb373b4181a023e"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const usuario = document.getElementById("usuario");
  const loginButton = document.getElementById("login");
  loginButton.addEventListener("click", async () => {
    const nombreUsuario = usuario.value;
    const comprobarUsuario = await getDoc(doc(db, "profesores", nombreUsuario));
    if (comprobarUsuario.exists()) {
      alert("Bienvenido, " + nombreUsuario);
      window.location.href = "index.html?user=" + encodeURIComponent(nombreUsuario);
    } else {
      const crearUsuario = window.confirm("Usuario no encontrado. ¿Quieres crear una cuenta con ese nombre?")
        if (!crearUsuario) {
            return;
        } else {
            await setDoc(doc(db, "usuarios", nombreUsuario), {});
            alert("Usuario creado: " + nombreUsuario);
        }
    }
  });
</script>
</body>
</html>
