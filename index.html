<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
<link rel="icon" type="image/png" sizes="16x16"  href="favicon-16x16.png">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="theme-color" content="#ffffff">
<title>DID for teachers</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
<div class="div">
  <h3 id="nombre"></h3>
  <div id="tablon">

  </div>
  <button onclick="anadirtexto()">Añadir texto</button>
  <button onclick="anadirTitulo()">Añadir título</button>
  <button onclick="anadirEnlace()">Añadir enlace</button>
  <button id="guardar">Guardar tablón</button>

<p>Creado por Daniel Tejedor</p>
</div>
<br>
<div class="div">
  <textarea id="html" rows="10" cols="50" placeholder="Introduce el código HTML que quieres añadir al tablón"></textarea>
  <button onclick="anadirHTML()">Añadir HTML</button>
</div>
<script>
  function anadirHTML() {
    const html = document.getElementById("html").value;
    if (html) {
      const contenedor = document.createElement("div");
      contenedor.innerHTML = html;
      contenedor.style.textAlign = "center";
      contenedor.contentEditable = "true";
      document.getElementById("tablon").appendChild(contenedor);
    }
  }
  function anadirtexto() {
    const texto = prompt("Introduce el texto que quieres añadir al tablón:");
    if (texto) {
      const parrafo = document.createElement("p");
      parrafo.textContent = texto;
      parrafo.style.textAlign = "center";
      parrafo.contentEditable = "true";
      document.getElementById("tablon").appendChild(parrafo);
    }
  }
  function anadirTitulo() {
    const titulo = prompt("Introduce el título que quieres añadir al tablón:");
    if (titulo) {
      const h2 = document.createElement("h2");
      h2.textContent = titulo;
      h2.style.textAlign = "center";
      h2.contentEditable = "true";
      document.getElementById("tablon").appendChild(h2);
    }
  }
  function anadirEnlace() {
    const url = prompt("Introduce la URL que quieres añadir al tablón:");
    if (url) {
      const enlace = document.createElement("a");
      enlace.href = url;
      enlace.textContent = url;
      enlace.textContent = url;
      enlace.target = "_blank";
      enlace.style.textAlign = "center";
      enlace.contentEditable = "true";
      document.getElementById("tablon").appendChild(enlace);
    }
  }
</script>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBNxuXBtO9LG81LAfnlMjyYgdVdP-4pz9c",
    authDomain: "didteachers.firebaseapp.com",
    projectId: "didteachers",
    storageBucket: "didteachers.firebasestorage.app",
    messagingSenderId: "197082231963",
    appId: "1:197082231963:web:489a176bb373b4181a023e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const usuario = decodeURIComponent(window.location.search.split("user=")[1]);
  document.getElementById("nombre").textContent = "hola, " + usuario;
  if (!usuario) {
    window.location.href = "login.html";
  } else {
    cargarTablon();
  }
  document.getElementById("guardar").addEventListener("click", guardarTablon); // Guardar al hacer click en el botón

  function cargarTablon() {
    const tabRef = doc(db, "profesores", usuario, "tablon", "contenido");
    getDoc(tabRef).then((docSnap) => {
      if (docSnap.exists()) {
        document.getElementById("tablon").innerHTML = docSnap.data().htmlContent;
      } else {
        console.log("No hay tablón guardado para este usuario.");
      }
    }).catch(error => console.error("Error al cargar el tablón:", error));
  }
  async function guardarTablon() {
    const tabRef = doc(db, "profesores", usuario, "tablon", "contenido");
    try {
      const tablon = document.getElementById("tablon").innerHTML;
      await setDoc(tabRef, {
        htmlContent: tablon // Guardar como 'htmlContent' para mayor claridad
      });
      document.getElementById("guardar").textContent = "Guardado";
      setTimeout(() => {
        document.getElementById("guardar").textContent = "Guardar tablón";
      }, 2000);
    } catch (error) {
      alert("error:" + error)
    }
  }
</script>
</body>
</html>
