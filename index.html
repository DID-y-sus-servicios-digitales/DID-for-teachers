<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" sizes="16x16"  href="favicon-16x16.png">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="theme-color" content="#ffffff">
<title>DID for teachers</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
<div class="div titulo">
  <button onclick="editable()" id="editbtn">Cambiar a no editable</button>
  <h3 id="nombre" style="cursor: pointer;" title="Volver a iniciar sesión" onclick="window.location.href = 'login.html'"></h3>
</div>
<br>
  <div id="tablon" class="div"></div>
<br>
<div class="div opciones">
  <div style="display: flex; justify-content: center; gap: 5px;">
    <button onclick="anadirtexto()">Añadir texto</button>
    <button onclick="anadirTitulo()">Añadir título</button>
    <button onclick="anadirEnlace()">Añadir enlace</button>
    <button onclick="mostrarHTML()">Añadir HTML</button>
    <button id="guardar" class="guardar">Guardar tablón</button>
     <div class="anuncio" onclick="window.open('quiz.html', '_self')"><p>Prueba DID quiz</p></div>
  </div>
  <p>Creado por Daniel Tejedor</p>
</div>
<br>
<div class="div" id="htmlInputConitainer" style="display: none; position: fixed; z-index: 9999; top: 50%; left: 100px;">
  <textarea id="htmlInput" style="height: 50px;"></textarea>
  <p><button onclick="anadirHTML()">Añadir HTML</button></p>
</div>
<br>
<script>
  var edit = true;
  function mostrarHTML() {
    document.getElementById("htmlInputConitainer").style.display = "block";
  }
  function editable() {
    if (edit) {
      document.getElementById("tablon").contentEditable = "false";
      document.getElementById("editbtn").textContent = "Cambiar a editable";
      document.querySelectorAll(".elementoDinamico").forEach(el => el.contentEditable = "false");
      edit = false;
    } else {
      document.getElementById("tablon").contentEditable = "true";
      document.querySelectorAll(".elementoDinamico").forEach(el => el.contentEditable = "true");
      edit = true;
      document.getElementById("editbtn").textContent = "Cambiar a no editable";
    }
  }
  function anadirtexto() {
    const texto = prompt("Introduce el texto que quieres añadir al tablón:");
    if (texto) {
      const parrafo = document.createElement("p");
      parrafo.innerHTML = texto;
      parrafo.style.textAlign = "center";
      parrafo.contentEditable = "true";
      parrafo.className = "elementoDinamico";
      document.getElementById("tablon").appendChild(parrafo);
    }
  }
  function anadirTitulo() {
    const titulo = prompt("Introduce el título que quieres añadir al tablón:");
    if (titulo) {
      const h2 = document.createElement("h2");
      h2.innerHTML = titulo;
      h2.style.textAlign = "center";
      h2.contentEditable = "true";
      h2.className = "elementoDinamico";
      document.getElementById("tablon").appendChild(h2);
    }
  }
  function anadirHTML() {
    const div = document.createElement("div");
    div.innerHTML = document.getElementById("htmlInput").value;
    div.style.textAlign = "center";
    div.contentEditable = "true";
    div.className = "elementoDinamico";
    document.getElementById("tablon").appendChild(div);
    document.getElementById("htmlInput").value = "";
    document.getElementById("htmlInputConitainer").style.display = "none";
  }
  function anadirEnlace() {
    const url = prompt("Introduce la URL que quieres añadir al tablón:");
    if (url) {
      const enlace = document.createElement("a");
      enlace.href = "enlace.html?enlace=" + url; // Usamos el sistema de redirección segura
      enlace.innerHTML = url;
      enlace.target = "_blank";
      enlace.style.textAlign = "center";
      enlace.contentEditable = "true";
      enlace.className = "elementoDinamico";
      document.getElementById("tablon").appendChild(enlace);
    }
  }
</script>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBNxuXBtO9LG81LAfnlMjyYgdVdP-4pz9c",
    authDomain: "didteachers.firebaseapp.com",
    projectId: "didteachers",
    storageBucket: "didteachers.firebasestorage.app",
    messagingSenderId: "197082231963",
    appId: "1:197082231963:web:489a176bb373b4181a023e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const urlParams = new URLSearchParams(window.location.search);
  const usuario = urlParams.get('user');
  document.getElementById("nombre").textContent = "Hola, " + usuario;
  if (!usuario) {
    window.location.href = "login.html";
  } else {
    cargarTablon();
  }
  document.getElementById("guardar").addEventListener("click", guardarTablon); // Guardar al hacer click en el botón
  document.getElementById("tablon").addEventListener("input", () => {
    guardarTablon();
  });
  function cargarTablon() {
    const tabRef = doc(db, "profesores", usuario, "tablon", "contenido");
    getDoc(tabRef).then((docSnap) => {
      if (docSnap.exists()) {
        document.getElementById("tablon").innerHTML = docSnap.data().htmlContent;
        // Hacemos que los elementos cargados sean editables
        document.getElementById("tablon").contentEditable = "true";
        document.querySelectorAll("#tablon > *").forEach(el => el.contentEditable = "true");
      } else {
        null
      }
    }).catch(error => console.error("Error al cargar el tablón:", error));
  }
  async function guardarTablon() {
    const tabRef = doc(db, "profesores", usuario, "tablon", "contenido");
    try {
      const tablon = document.getElementById("tablon").innerHTML;
      await setDoc(tabRef, {
        htmlContent: tablon // Guardar como 'htmlContent' para mayor claridad
      });
      document.getElementById("guardar").textContent = "Guardado";
      setTimeout(() => {
        document.getElementById("guardar").textContent = "Guardar tablón";
      }, 2000);
    } catch (error) {
      alert("error:" + error)
    }
  }
</script>
</body>
</html>
