<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" sizes="16x16"  href="favicon-16x16.png">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="theme-color" content="#ffffff">
<title>Redirigiendo...</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="div">
        <h1>Te estamos redirigiendo...</h1>
        <h2>abrimos tus enlaces de forma segura</h2>
        <p>Creado por Daniel Tejedor</p>
    </div>
</div>
<script>
    setTimeout(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('enlace');
        if (targetUrl.includes("https://")) {
            window.location.replace(targetUrl);
        }
        else if (targetUrl.includes("http://")) {
            const insegura = confirm("Esta url no es segura, ¿desea abrirla?")
            if (insegura) {
                window.location.replace(targetUrl);
            } else {
                window.close()
            }
        }
        else {
            window.location.replace('https://' + targetUrl);
        }
    }, 2000);
</script>
</body>
</html>
